<!DOCTYPE html>
<html>
<head>
<title>Menu</title>

<style>

body{
font-family:Arial;
text-align:center;

}

.menu{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
}

.item{
background:white;
padding:20px;
border-radius:10px;
}

.item img{

height:150px;

</head>

<img src="pizza.jpg">
<h3>Pizza</h3>
<p>₹250</p>
</div>

<div class="item">
<img src="burger.jpg">
<h3>Burger</h3>
<p>₹120</p>
</div>

<div class="item">
<img src="pasta.jpg">
<h3>Pasta</h3>
<p>₹200</p>
</div>

</div>

<a href="index.html">
<button>Back</button>
</a>

</body>
</html>
